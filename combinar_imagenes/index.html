<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinar Imágenes | atnojs.es</title>
    <meta name="description" content="Fusiona múltiples imágenes en una sola composición usando IA">
    <link rel="icon" href="https://atnojs.es/iconos/favicon1.ico" type="image/x-icon">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="web.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="gradient-text">Combinar Imágenes</h1>
            <p class="subtitle">Fusiona múltiples imágenes en una composición única con IA</p>
        </header>

        <!-- Layout 2 columnas -->
        <main class="two-column-layout">

            <!-- COLUMNA IZQUIERDA: Controles -->
            <section class="control-panel glass">

                <!-- Grid unificado: Fondo + Imágenes a combinar -->
                <div class="section-block">
                    <h2 class="section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect width="7" height="7" x="3" y="3" rx="1" />
                            <rect width="7" height="7" x="14" y="3" rx="1" />
                            <rect width="7" height="7" x="3" y="14" rx="1" />
                            <rect width="7" height="7" x="14" y="14" rx="1" />
                        </svg>
                        Imágenes
                        <span class="counter" id="imageCounter">0/10</span>
                    </h2>
                    <p class="section-desc">El primer slot es el fondo (opcional). Mínimo 2 imágenes para combinar.</p>

                    <!-- Grid unificado de imágenes -->
                    <div class="images-grid" id="imagesGrid">
                        <!-- Los campos se generan dinámicamente -->
                    </div>
                </div>

                <!-- Separador -->
                <div class="divider"></div>

                <!-- Prompt -->
                <div class="section-block">
                    <h2 class="section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                        </svg>
                        Prompt
                    </h2>
                    <textarea id="promptInput" class="prompt-textarea"
                        placeholder="Describe cómo quieres combinar las imágenes..."></textarea>

                    <!-- Botones de acción del prompt -->
                    <div class="prompt-actions">
                        <button class="btn-enhance" id="btnEnhance">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path
                                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21" />
                                <path d="M17 3v4" />
                                <path d="M21 5h-4" />
                            </svg>
                            Mejorar Prompt
                        </button>
                        <button class="btn-clear" id="btnClearPrompt">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                                <path d="M21 3v5h-5" />
                            </svg>
                            Limpiar
                        </button>
                    </div>

                    <!-- Botones de prompts mejorados (Prompt 1, 2, 3, 4) -->
                    <div class="prompt-buttons hidden" id="promptButtons">
                        <button class="prompt-btn" data-index="0">Prompt 1</button>
                        <button class="prompt-btn" data-index="1">Prompt 2</button>
                        <button class="prompt-btn" data-index="2">Prompt 3</button>
                        <button class="prompt-btn" data-index="3">Prompt 4</button>
                    </div>
                </div>

                <!-- Aspect Ratio -->
                <div class="section-block">
                    <h2 class="section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                        </svg>
                        Relación de Aspecto
                    </h2>
                    <div class="ar-selector" id="arSelector">
                        <button class="ar-option active" data-ar="1:1">1:1</button>
                        <button class="ar-option" data-ar="3:2">3:2</button>
                        <button class="ar-option" data-ar="4:5">4:5</button>
                        <button class="ar-option" data-ar="16:9">16:9</button>
                        <button class="ar-option" data-ar="21:9">21:9</button>
                        <button class="ar-option" data-ar="9:16">9:16</button>
                    </div>
                </div>

                <!-- Botón Generar -->
                <button class="btn-generate btn-3d" id="btnGenerate">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                    <span>Generar Imágenes</span>
                </button>

                <!-- (Spinner movido al root) -->

                <!-- Mensajes de Error -->
                <div class="error-message hidden" id="errorMessage"></div>
            </section>

            <!-- COLUMNA DERECHA: Resultados/Historial -->
            <section class="results-panel glass" id="historySection">
                <h2 class="section-title results-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </svg>
                    Resultados
                    <span class="badge info" id="historyCount">0</span>
                </h2>

                <div class="history-grid" id="historyGrid">
                    <!-- Las imágenes generadas se añaden aquí -->
                    <div class="history-empty" id="historyEmpty">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                            <circle cx="9" cy="9" r="2" />
                            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                        </svg>
                        <p>Las imágenes generadas aparecerán aquí</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Lightbox Modal -->
        <div class="lightbox hidden" id="lightbox">
            <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
            <div class="lightbox-content">
                <img src="" alt="Preview" id="lightboxImg">
                <div class="lightbox-actions">
                    <button class="lightbox-btn" id="lightboxDownload" title="Descargar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" x2="12" y1="15" y2="3" />
                        </svg>
                    </button>
                    <button class="lightbox-btn close" id="lightboxClose" title="Cerrar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Loading Overlay -->
        <div class="loading-overlay hidden" id="loadingOverlay">
            <div class="spinner-triple">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
            </div>
            <p class="loading-text">IA Generando Obra Maestra...</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="web.js"></script>
</body>

</html>
